spring.application.name=backend

# ---------------------------------------------------------------
# Base de donnees PostgreSQL
# (les identifiants sont surchargeables via variables d'environnement)
# La base 'gondor_chic' doit exister au prealable (PostgreSQL ne la cree
# pas automatiquement). Voir le README pour la commande de creation.
# ---------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gondor_chic}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
